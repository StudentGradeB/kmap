<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF9F6;--card:#fff;--primary:#0f1729;--accent:#2563eb;--accent2:#6366f1;
  --text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--border-l:#f3f4f6;
  --s0:#94a3b8;--s1:#3b82f6;--s2:#f59e0b;--s3:#22c55e;
  --s0bg:#f1f5f9;--s1bg:#eff6ff;--s2bg:#fffbeb;--s3bg:#f0fdf4;
  --radius:14px;--nav-h:62px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 12px)}
/* Header */
.hdr{
  background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;min-height:52px;
}
.hdr-title{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr button{background:none;border:none;color:#fff;cursor:pointer;padding:4px;display:flex}
/* Bottom Nav */
.bnav{
  display:flex;background:#fff;border-top:1px solid var(--border);
  padding-bottom:var(--safe-b);position:relative;z-index:50;flex-shrink:0;
}
.bnav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 0 8px;background:none;border:none;cursor:pointer;
  font-size:11px;font-weight:500;color:var(--muted);font-family:inherit;
  transition:color .15s;
}
.bnav button.active{color:var(--accent);font-weight:700}
.bnav button.active svg{stroke-width:2.5}
/* Cards */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:8px;cursor:pointer;text-align:left;width:100%;
  display:block;transition:transform .1s;font-family:inherit;font-size:inherit;color:inherit;
}
.card:active{transform:scale(.98)}
/* Progress ring */
.ring{position:relative;width:38px;height:38px;flex-shrink:0}
.ring span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
/* Status pills */
.pill{
  display:inline-block;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;
  line-height:1.6;
}
/* Node card */
.ncard{
  display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:6px;cursor:pointer;text-align:left;width:100%;border-left:3px solid var(--s0);
  font-family:inherit;font-size:inherit;color:inherit;
}
.ncard:active{background:#fafafa}
/* Search */
.search-box{
  display:flex;align-items:center;gap:10px;background:#fff;
  border:1px solid var(--border);border-radius:12px;padding:10px 14px;
}
.search-box input{
  flex:1;border:none;outline:none;font-size:15px;background:transparent;
  color:var(--text);font-family:inherit;
}
.search-box input::placeholder{color:var(--muted)}
/* Status selector */
.status-btn{
  padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);
  font-family:inherit;transition:all .15s;
}
.status-btn.active{border-width:2px}
/* Notes area */
.note-area{
  width:100%;min-height:160px;padding:14px;border-radius:0 0 12px 12px;
  border:1px solid var(--accent);border-top:none;font-size:14px;line-height:1.7;
  font-family:'DM Sans',sans-serif;outline:none;
  background:#fafbff;color:var(--text);
}
.note-area:empty::before{content:attr(data-placeholder);color:var(--muted);pointer-events:none}
[contenteditable]:empty::before{content:attr(data-placeholder);color:var(--muted);pointer-events:none}
.note-display{
  padding:14px;background:#fff;border:1px solid var(--border);border-radius:12px;
  font-size:14px;line-height:1.7;cursor:pointer;
}
.note-display ul,.note-area ul{padding-left:20px;margin:4px 0}
.note-display ol,.note-area ol{padding-left:20px;margin:4px 0}
.note-display li,.note-area li{margin:2px 0}
.note-display b,.note-area b,.note-display strong,.note-area strong{font-weight:700}
.note-display em,.note-area em,.note-display i,.note-area i{font-style:italic}
.note-display u,.note-area u{text-decoration:underline}
.note-display s,.note-area s{text-decoration:line-through}
.note-display mark,.note-area mark{background:#fef08a;border-radius:2px;padding:0 2px}
.note-empty{
  padding:24px;background:var(--border-l);border-radius:12px;text-align:center;
  color:var(--muted);font-size:13px;cursor:pointer;border:1px dashed var(--border);
}
/* Rich text toolbar */
.rte-wrap{border:1px solid var(--accent);border-radius:12px;overflow:hidden;background:#fafbff}
.rte-toolbar{
  display:flex;align-items:center;gap:2px;padding:6px 8px;
  background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.rte-btn{
  width:30px;height:28px;border:none;background:transparent;cursor:pointer;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);
  transition:background .1s;flex-shrink:0;
}
.rte-btn:hover{background:var(--border-l)}
.rte-btn.active{background:#eef2ff;color:var(--accent)}
.rte-sep{width:1px;height:18px;background:var(--border);margin:0 4px;flex-shrink:0}
/* Sub-topic */
.subtopic{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  margin-bottom:6px;overflow:hidden;
}
.subtopic-header{display:flex;align-items:center;gap:10px;padding:10px 12px}
.st-circle{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--s0);
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;padding:0;
}
.st-circle.done{background:var(--s3);border-color:var(--s3)}
/* Btn styles */
.btn{
  padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;
  font-family:inherit;font-weight:600;border:none;display:inline-flex;align-items:center;gap:4px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--muted)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:8px}
.label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease-out}
/* Desktop */
@media(min-width:768px){
  .scroll{display:flex;justify-content:center}
  .scroll>.content{width:100%;max-width:680px;padding:0 20px}
  .bnav{justify-content:center}
  .bnav button{max-width:120px}
}
</style>
</head>

const BASE_TAX=R.map((d,di)=>({id:'d'+di,title:d.t,desc:d.d||'',subs:d.s.map((s,si)=>({id:'d'+di+'s'+si,title:s.t,nodes:s.n.map((n,ni)=>({id:'d'+di+'s'+si+'n'+ni,title:Array.isArray(n)?n[0]:n,desc:Array.isArray(n)?n[1]:''}))}))}));
let TAX=[], TOTAL=0;

// ═══ CUSTOM DATA ═══
// custom = { domains:[], subdomains:{ domainId:[...] }, nodes:{ subdomainId:[...] } }
function loadCustom(){return LS('custom')||{domains:[],subdomains:{},nodes:{}}}
function saveCustom(c){LS('custom',c)}

function rebuildTax(){
  const c=loadCustom();
  // Deep clone base
  TAX=BASE_TAX.map(d=>({...d,subs:d.subs.map(s=>({...s,nodes:[...s.nodes]}))}));
  // Append custom subdomains to existing domains
  TAX.forEach(d=>{
    if(c.subdomains[d.id])c.subdomains[d.id].forEach(cs=>d.subs.push(cs));
    d.subs.forEach(s=>{if(c.nodes[s.id])c.nodes[s.id].forEach(cn=>s.nodes.push(cn))});
  });
  // Append custom domains
  c.domains.forEach(cd=>TAX.push(cd));
  TOTAL=TAX.reduce((s,d)=>s+d.subs.reduce((s2,sd)=>s2+sd.nodes.length,0),0);
}
rebuildTax();

function ghConfig(){return LS('gh_config')||null}
function ghSaveConfig(c){LS('gh_config',c)}
function ghClearConfig(){localStorage.removeItem('km_gh_config')}

async function ghPush(){
  const cfg=ghConfig();
  if(!cfg||!cfg.token||!cfg.repo)return{ok:false,msg:'Not configured'};
  const data=JSON.stringify({statuses:state.statuses,notes:state.notes,subtopics:state.subtopics,custom:loadCustom(),updated:new Date().toISOString()});
  const content=btoa(unescape(encodeURIComponent(data)));
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'kmap-data.json'}`;
  try{
    // Get current SHA if file exists
    let sha=null;
    try{
      const r=await fetch(url,{headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github.v3+json'}});
      if(r.ok){const j=await r.json();sha=j.sha;}
    }catch{}
    const body={message:'KMap sync '+new Date().toLocaleString(),content};
    if(sha)body.sha=sha;
    const resp=await fetch(url,{method:'PUT',headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(resp.ok){LS('last_sync',new Date().toISOString());return{ok:true,msg:'Synced'};}
    const err=await resp.json();
    return{ok:false,msg:err.message||'Push failed'};
  }catch(e){return{ok:false,msg:e.message||'Network error'};}
}

async function ghPull(){
  const cfg=ghConfig();
  if(!cfg||!cfg.token||!cfg.repo)return{ok:false,msg:'Not configured'};
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'kmap-data.json'}`;
  try{
    const resp=await fetch(url,{headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github.v3+json'}});
    if(resp.status===404)return{ok:true,msg:'No remote data yet — will create on first sync'};
    if(!resp.ok){const err=await resp.json();return{ok:false,msg:err.message||'Pull failed'};}
    const j=await resp.json();
    const raw=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    const data=JSON.parse(raw);
    // Merge: remote wins for fields that exist
    if(data.statuses)state.statuses={...state.statuses,...data.statuses};
    if(data.notes)state.notes={...state.notes,...data.notes};
    if(data.subtopics)state.subtopics={...state.subtopics,...data.subtopics};
    if(data.custom){
      const local=loadCustom();
      // Merge custom domains
      const localIds=new Set(local.domains.map(d=>d.id));
      (data.custom.domains||[]).forEach(d=>{if(!localIds.has(d.id))local.domains.push(d)});
      // Merge custom subdomains and nodes
      Object.entries(data.custom.subdomains||{}).forEach(([k,v])=>{
        if(!local.subdomains[k])local.subdomains[k]=[];
        const ids=new Set(local.subdomains[k].map(s=>s.id));
        v.forEach(s=>{if(!ids.has(s.id))local.subdomains[k].push(s)});
      });
      Object.entries(data.custom.nodes||{}).forEach(([k,v])=>{
        if(!local.nodes[k])local.nodes[k]=[];
        const ids=new Set(local.nodes[k].map(n=>n.id));
        v.forEach(n=>{if(!ids.has(n.id))local.nodes[k].push(n)});
      });
      saveCustom(local);rebuildTax();
    }
    LS('statuses',state.statuses);LS('notes',state.notes);LS('subs',state.subtopics);
    LS('last_sync',new Date().toISOString());
    return{ok:true,msg:'Pulled from GitHub'};
  }catch(e){return{ok:false,msg:e.message||'Network error'};}
}

const $=id=>document.getElementById(id);

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='onclick'||k==='oninput'||k==='onkeydown'||k==='onchange')el[k]=v;
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null)return;
    if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}

function progress(domain){
  let total=0,mastered=0,started=0;
  domain.subs.forEach(sd=>sd.nodes.forEach(n=>{
    total++;const s=state.statuses[n.id]||0;
    if(s===3)mastered++;if(s>0)started++;
  }));
  return{total,mastered,started,pct:total?Math.round(mastered/total*100):0};
}

function overallProgress(){
  let t=0,m=0,s=0;
  TAX.forEach(d=>{const p=progress(d);t+=p.total;m+=p.mastered;s+=p.started});
  return{total:t,mastered:m,started:s,pct:t?Math.round(m/t*100):0};
}

function ring(pct,size=38){
  const r=(size/2)-4,c=2*Math.PI*r;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border-l)" stroke-width="3"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--s3)" stroke-width="3" stroke-dasharray="${(pct/100)*c} ${c}" transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="round"/></svg>`;
}

      <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.title}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${p.mastered}/${p.total} mastered</div></div>
      <div class="ring">${ring(p.pct)}<span>${p.pct}%</span></div>`;
    el.appendChild(card);
  });
}

function renderBrowse(el){
  el.appendChild(h('h2',{style:{fontSize:'18px',fontWeight:'700',color:'var(--primary)',margin:'8px 0 16px'}},'Browse All Domains'));
  TAX.forEach((d,i)=>{
    const p=progress(d);
    const nc=d.subs.reduce((s,sd)=>s+sd.nodes.length,0);
    const card=h('div',{className:'card',style:{position:'relative'}});
    const clickArea=h('div',{style:{cursor:'pointer'},onclick:()=>{state.domain=d;state.view='domain';state.addingSubdomain=false;render()}});
    clickArea.innerHTML=`<div style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:4px">${i+1}. ${d.title}</div>
      ${d.desc?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.4">${d.desc}</div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)"><span>${d.subs.length} sections · ${nc} topics</span><span style="font-weight:600;color:${p.pct>0?'var(--s3)':'var(--muted)'}">${p.pct}%</span></div>`;
    card.appendChild(clickArea);
    if(d.custom){
      const del=h('button',{style:{position:'absolute',top:'8px',right:'8px',background:'none',border:'none',cursor:'pointer',opacity:'.3',padding:'4px'},innerHTML:ICO.trash,
        onclick:e=>{e.stopPropagation();if(confirm('Delete "'+d.title+'" and all its contents?')){deleteCustomDomain(d.id);save();render()}}});
      card.appendChild(del);
    }
    el.appendChild(card);
  });
  // Add Domain button/form
  if(state.addingDomain){
    const form=h('div',{className:'card',style:{borderColor:'var(--accent)',borderStyle:'dashed'}});
    const ti=h('input',{type:'text',placeholder:'Domain title...',style:{width:'100%',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--accent)',fontSize:'14px',fontFamily:'inherit',outline:'none',marginBottom:'8px',boxSizing:'border-box'},
      oninput:e=>state.newTitle=e.target.value});
    const di=h('input',{type:'text',placeholder:'Description (optional)...',style:{width:'100%',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--border)',fontSize:'13px',fontFamily:'inherit',outline:'none',marginBottom:'10px',boxSizing:'border-box'},
      oninput:e=>state.newDesc=e.target.value});
    const acts=h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
    acts.appendChild(h('button',{className:'btn btn-outline',onclick:()=>{state.addingDomain=false;state.newTitle='';state.newDesc='';render()}},'Cancel'));
    acts.appendChild(h('button',{className:'btn btn-primary',onclick:()=>{
      if(state.newTitle?.trim()){addCustomDomain(state.newTitle.trim(),state.newDesc?.trim());state.addingDomain=false;state.newTitle='';state.newDesc='';save();render()}
    }},'Add Domain'));
    form.appendChild(ti);form.appendChild(di);form.appendChild(acts);
    el.appendChild(form);
    setTimeout(()=>ti.focus(),50);
  } else {
    const addBtn=h('button',{className:'card',style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',color:'var(--accent)',fontSize:'13px',fontWeight:'600',borderStyle:'dashed'},
      onclick:()=>{state.addingDomain=true;render()}});
    addBtn.innerHTML=ICO.plus+' Add Custom Domain';
    el.appendChild(addBtn);
  }
}

function renderSearch(el){
  const box=h('div',{className:'search-box',style:{marginBottom:'12px'}});
  const inp=h('input',{type:'text',placeholder:'Search concepts...',value:state.search,
    oninput:e=>{state.search=e.target.value;renderSearchResults(el)}});
  box.innerHTML=ICO.search;
  box.appendChild(inp);
  if(state.search){
    const clr=h('button',{style:{background:'none',border:'none',cursor:'pointer',padding:'2px'},innerHTML:ICO.x,
      onclick:()=>{state.search='';render()}});
    box.appendChild(clr);
  }
  el.appendChild(box);
  const resultsDiv=h('div',{id:'search-results'});
  el.appendChild(resultsDiv);
  renderSearchResults(el);
}

function renderSearchResults(el){
  const rd=el.querySelector('#search-results')||el;
  if(el.querySelector('#search-results'))rd.innerHTML='';
  const q=state.search.toLowerCase();
  if(q.length<2)return;
  let count=0;
  TAX.forEach(d=>d.subs.forEach(sd=>sd.nodes.forEach(n=>{
    if(count>=30)return;
    if(n.title.toLowerCase().includes(q)||(n.desc&&n.desc.toLowerCase().includes(q))){
      count++;
      const st=state.statuses[n.id]||0;
      const card=h('button',{className:'ncard',style:{borderLeftColor:SCV[st]},
        onclick:()=>{state.domain=d;state.subdomain=sd;state.node=n;state.view='topic';state.tab='browse';state.editing=false;state.draft=state.notes[n.id]||'';render()}});
      card.innerHTML=`<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">${n.title}</div><div style="font-size:11px;color:var(--muted);margin-top:3px">${d.title} → ${sd.title}</div></div>${ICO.right}`;
      rd.appendChild(card);
    }
  })));
  if(count===0){
    rd.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">${ICO.search}<div style="margin-top:8px">No matching concepts</div></div>`;
  }
}

function renderDomain(el){
  const d=state.domain;
  if(d.desc)el.appendChild(h('p',{style:{fontSize:'13px',color:'var(--muted)',margin:'0 0 16px',lineHeight:'1.5'}},d.desc));
  d.subs.forEach(sd=>{
    const total=sd.nodes.length;
    const m=sd.nodes.filter(n=>(state.statuses[n.id]||0)===3).length;
    const s=sd.nodes.filter(n=>(state.statuses[n.id]||0)>0).length;
    const pct=total?Math.round(m/total*100):0;
    const card=h('div',{className:'card',style:{position:'relative'}});
    const clickArea=h('div',{style:{cursor:'pointer'},onclick:()=>{state.subdomain=sd;state.view='subdomain';state.addingNode=false;render()}});
    clickArea.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:14px;font-weight:600">${sd.title}</span><span style="font-size:12px;color:var(--muted)">${m}/${total}</span></div>
      <div style="background:var(--border-l);border-radius:6px;height:4px;overflow:hidden"><div style="height:100%;border-radius:6px;width:${Math.max(pct,s>0?2:0)}%;background:${m===total&&total?'var(--s3)':s>0?'var(--s1)':'var(--border)'}"></div></div>`;
    card.appendChild(clickArea);
    if(sd.custom){
      const del=h('button',{style:{position:'absolute',top:'8px',right:'8px',background:'none',border:'none',cursor:'pointer',opacity:'.3',padding:'4px'},innerHTML:ICO.trash,
        onclick:e=>{e.stopPropagation();if(confirm('Delete "'+sd.title+'"?')){deleteCustomSubdomain(d.id,sd.id);state.domain=TAX.find(x=>x.id===d.id)||d;save();render()}}});
      card.appendChild(del);
    }
    el.appendChild(card);
  });
  // Add Subdomain
  if(state.addingSubdomain){
    const form=h('div',{className:'card',style:{borderColor:'var(--accent)',borderStyle:'dashed'}});
    const ti=h('input',{type:'text',placeholder:'Subdomain title...',style:{width:'100%',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--accent)',fontSize:'14px',fontFamily:'inherit',outline:'none',marginBottom:'10px',boxSizing:'border-box'},
      oninput:e=>state.newTitle=e.target.value,
      onkeydown:e=>{if(e.key==='Enter'&&state.newTitle?.trim()){addCustomSubdomain(d.id,state.newTitle.trim());state.addingSubdomain=false;state.newTitle='';state.domain=TAX.find(x=>x.id===d.id)||d;save();render()}}});
    const acts=h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
    acts.appendChild(h('button',{className:'btn btn-outline',onclick:()=>{state.addingSubdomain=false;state.newTitle='';render()}},'Cancel'));
    acts.appendChild(h('button',{className:'btn btn-primary',onclick:()=>{
      if(state.newTitle?.trim()){addCustomSubdomain(d.id,state.newTitle.trim());state.addingSubdomain=false;state.newTitle='';state.domain=TAX.find(x=>x.id===d.id)||d;save();render()}
    }},'Add'));
    form.appendChild(ti);form.appendChild(acts);
    el.appendChild(form);
    setTimeout(()=>ti.focus(),50);
  } else {
    const addBtn=h('button',{className:'card',style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',color:'var(--accent)',fontSize:'13px',fontWeight:'600',borderStyle:'dashed'},
      onclick:()=>{state.addingSubdomain=true;render()}});
    addBtn.innerHTML=ICO.plus+' Add Subdomain';
    el.appendChild(addBtn);
  }
}

function renderSubdomain(el){
  const sd=state.subdomain;
  sd.nodes.forEach(n=>{
    const st=state.statuses[n.id]||0;
    const hasN=state.notes[n.id]&&state.notes[n.id].length>0;
    const hasS=(state.subtopics[n.id]||[]).length>0;
    const card=h('div',{className:'ncard',style:{borderLeftColor:SCV[st],position:'relative'}});
    const clickArea=h('div',{style:{flex:'1',minWidth:'0',cursor:'pointer'},
      onclick:()=>{state.node=n;state.view='topic';state.editing=false;state.draft=state.notes[n.id]||'';state.showAddSub=false;state.expandedSub=null;render()}});
    let pills=`<span class="pill" style="background:${['#f1f5f9','#eff6ff','#fffbeb','#f0fdf4'][st]};color:${SCV[st]}">${SL[st]}</span>`;
    if(hasN)pills+=' <span class="pill" style="background:#faf5ff;color:#7c3aed">📝</span>';
    if(hasS)pills+=' <span class="pill" style="background:#fefce8;color:#a16207">+Sub</span>';
    clickArea.innerHTML=`<div style="font-size:13px;font-weight:500;line-height:1.4">${n.title}</div>${n.desc?`<div style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3">${n.desc}</div>`:''}
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${pills}</div>`;
    card.appendChild(clickArea);
    if(n.custom){
      const del=h('button',{style:{background:'none',border:'none',cursor:'pointer',opacity:'.3',padding:'4px',flexShrink:'0'},innerHTML:ICO.trash,
        onclick:e=>{e.stopPropagation();if(confirm('Delete "'+n.title+'"?')){deleteCustomNode(sd.id,n.id);state.subdomain=TAX.flatMap(d=>d.subs).find(x=>x.id===sd.id)||sd;save();render()}}});
      card.appendChild(del);
    } else {
      card.appendChild(h('div',{innerHTML:ICO.right,style:{flexShrink:'0',color:'var(--muted)',marginTop:'2px'}}));
    }
    el.appendChild(card);
  });
  // Add Topic
  if(state.addingNode){
    const form=h('div',{className:'card',style:{borderColor:'var(--accent)',borderStyle:'dashed'}});
    const ti=h('input',{type:'text',placeholder:'Topic title...',style:{width:'100%',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--accent)',fontSize:'14px',fontFamily:'inherit',outline:'none',marginBottom:'8px',boxSizing:'border-box'},
      oninput:e=>state.newTitle=e.target.value});
    const di=h('input',{type:'text',placeholder:'Description (optional)...',style:{width:'100%',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--border)',fontSize:'13px',fontFamily:'inherit',outline:'none',marginBottom:'10px',boxSizing:'border-box'},
      oninput:e=>state.newDesc=e.target.value});
    const acts=h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
    acts.appendChild(h('button',{className:'btn btn-outline',onclick:()=>{state.addingNode=false;state.newTitle='';state.newDesc='';render()}},'Cancel'));
    acts.appendChild(h('button',{className:'btn btn-primary',onclick:()=>{
      if(state.newTitle?.trim()){addCustomNode(sd.id,state.newTitle.trim(),state.newDesc?.trim());state.addingNode=false;state.newTitle='';state.newDesc='';state.subdomain=TAX.flatMap(d=>d.subs).find(x=>x.id===sd.id)||sd;save();render()}
    }},'Add'));
    form.appendChild(ti);form.appendChild(di);form.appendChild(acts);
    el.appendChild(form);
    setTimeout(()=>ti.focus(),50);
  } else {
    const addBtn=h('button',{className:'card',style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',color:'var(--accent)',fontSize:'13px',fontWeight:'600',borderStyle:'dashed'},
      onclick:()=>{state.addingNode=true;render()}});
    addBtn.innerHTML=ICO.plus+' Add Topic';
    el.appendChild(addBtn);
  }
}

function renderTopic(el){
  const n=state.node;
  const st=state.statuses[n.id]||0;
  const noteText=state.notes[n.id]||'';
  const subs=state.subtopics[n.id]||[];

  // Title
  el.appendChild(h('h2',{style:{fontSize:'18px',fontWeight:'700',color:'var(--primary)',margin:'0 0 8px',lineHeight:'1.3'}},n.title));
  if(n.desc)el.appendChild(h('p',{style:{fontSize:'14px',color:'var(--muted)',lineHeight:'1.5',margin:'0 0 20px'}},n.desc));

  // Status
  el.appendChild(h('div',{className:'label'},'Status'));
  const sRow=h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'20px'}});
  SL.forEach((label,i)=>{
    const btn=h('button',{className:'status-btn'+(st===i?' active':''),
      style:st===i?{borderColor:SCV[i],background:['var(--s0bg)','var(--s1bg)','var(--s2bg)','var(--s3bg)'][i],color:SCV[i]}:{},
      onclick:()=>{state.statuses[n.id]=i;save();render()}},label);
    sRow.appendChild(btn);
  });
  el.appendChild(sRow);

  // Notes
  const noteHeader=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}});
  noteHeader.appendChild(h('div',{className:'label',style:{margin:0}},'Notes'));
  if(!state.editing){
    const editBtn=h('button',{className:'btn btn-sm',style:{background:'#eef2ff',color:'var(--accent)'},
      onclick:()=>{state.editing=true;state.draft=noteText;render()}});
    editBtn.innerHTML=ICO.edit+' '+(noteText?'Edit':'Add');
    noteHeader.appendChild(editBtn);
  }
  el.appendChild(noteHeader);

  if(state.editing){
    // Rich Text Editor — save/restore selection so toolbar works on mobile too
    const wrap=h('div',{className:'rte-wrap',style:{marginBottom:'8px'}});

    // Saved selection range (survives button tap focus-loss)
    let savedRange=null;
    function saveSelection(){
      const sel=window.getSelection();
      if(sel&&sel.rangeCount>0&&editor.contains(sel.anchorNode)){
        savedRange=sel.getRangeAt(0).cloneRange();
      }
    }
    function restoreSelection(){
      editor.focus();
      const sel=window.getSelection();
      if(sel&&savedRange){
        sel.removeAllRanges();
        sel.addRange(savedRange);
      }
    }
    function isYellow(c){return c&&(c.includes('254, 240')||c.includes('fef08a')||c==='#fef08a')}
    function applyFmt(cmd,val){
      restoreSelection();
      document.execCommand(cmd,false,val||null);
      state.draft=editor.innerHTML;
      updateToolbar();
    }
    function toggleHighlight(){
      restoreSelection();
      const cur=document.queryCommandValue('hiliteColor')||document.queryCommandValue('backColor');
      document.execCommand('hiliteColor',false,isYellow(cur)?'transparent':'#fef08a');
      state.draft=editor.innerHTML;
      updateToolbar();
    }

    // Toolbar
    const tb=h('div',{className:'rte-toolbar'});
    function rteBtn(title,icon,cmd,val){
      const b=h('button',{type:'button',className:'rte-btn',title:title,innerHTML:icon});
      b.addEventListener('touchstart',e=>{e.preventDefault();saveSelection();applyFmt(cmd,val)},{passive:false});
      b.addEventListener('mousedown',e=>{e.preventDefault();applyFmt(cmd,val)});
      return b;
    }
    const boldB   =rteBtn('Bold',   '<b>B</b>',    'bold');
    const italicB =rteBtn('Italic', '<i>I</i>',    'italic');
    const underB  =rteBtn('Underline','<u style="text-decoration:underline">U</u>','underline');
    const strikeB =rteBtn('Strikethrough','<s>S</s>','strikeThrough');
    const hlB=h('button',{type:'button',className:'rte-btn',title:'Highlight',innerHTML:'<span style="background:#fef08a;padding:0 3px;border-radius:2px;font-size:12px">H</span>'});
    hlB.addEventListener('touchstart',e=>{e.preventDefault();saveSelection();toggleHighlight();},{passive:false});
    hlB.addEventListener('mousedown',e=>{e.preventDefault();toggleHighlight();});
    const ulB     =rteBtn('Bullet list',`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>`,'insertUnorderedList');
    const olB     =rteBtn('Numbered list',`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">1.</text><text x="2" y="14" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">2.</text><text x="2" y="20" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">3.</text></svg>`,'insertOrderedList');

    [boldB,italicB,underB,strikeB,h('div',{className:'rte-sep'}),hlB,h('div',{className:'rte-sep'}),ulB,olB].forEach(x=>tb.appendChild(x));
    wrap.appendChild(tb);

    // Editor div
    const editor=h('div',{className:'note-area',contentEditable:'true',
      'data-placeholder':'Key points, connections, exam tips...'});
    editor.innerHTML=state.draft||'';
    editor.addEventListener('input',()=>{state.draft=editor.innerHTML;updateToolbar()});
    editor.addEventListener('keyup',()=>{saveSelection();updateToolbar()});
    editor.addEventListener('mouseup',()=>{saveSelection();updateToolbar()});
    editor.addEventListener('touchend',()=>{saveSelection();updateToolbar()});
    wrap.appendChild(editor);

    function updateToolbar(){
      boldB.classList.toggle('active',document.queryCommandState('bold'));
      italicB.classList.toggle('active',document.queryCommandState('italic'));
      underB.classList.toggle('active',document.queryCommandState('underline'));
      strikeB.classList.toggle('active',document.queryCommandState('strikeThrough'));
      ulB.classList.toggle('active',document.queryCommandState('insertUnorderedList'));
      olB.classList.toggle('active',document.queryCommandState('insertOrderedList'));
      const hlColor=document.queryCommandValue('hiliteColor')||document.queryCommandValue('backColor');
      hlB.classList.toggle('active',isYellow(hlColor));
    }

    el.appendChild(wrap);
    const acts=h('div',{style:{display:'flex',gap:'8px',marginTop:'8px',justifyContent:'flex-end',marginBottom:'20px'}});
    acts.appendChild(h('button',{className:'btn btn-outline',onclick:()=>{state.editing=false;render()}},'Cancel'));
    acts.appendChild(h('button',{className:'btn btn-primary',onclick:()=>{state.notes[n.id]=state.draft;state.editing=false;save();render()}},'Save'));
    el.appendChild(acts);
    setTimeout(()=>editor.focus(),60);

  } else if(noteText){
    const nd=h('div',{className:'note-display',onclick:()=>{state.editing=true;state.draft=noteText;render()}});
    nd.innerHTML=noteText;
    el.appendChild(nd);
    el.appendChild(h('div',{style:{height:'20px'}}));
  } else {
    el.appendChild(h('div',{className:'note-empty',onclick:()=>{state.editing=true;state.draft='';render()}},'Tap to add notes'));
    el.appendChild(h('div',{style:{height:'20px'}}));
  }

  // Subtopics
  const subHeader=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}});
  subHeader.appendChild(h('div',{className:'label',style:{margin:0}},'Subtopics'+(subs.length?` (${subs.length})`:'')));
  const addBtn=h('button',{className:'btn btn-sm',style:{background:'#f0fdf4',color:'#16a34a'},
    onclick:()=>{state.showAddSub=true;render()}});
  addBtn.innerHTML=ICO.plus+' Add';
  subHeader.appendChild(addBtn);
  el.appendChild(subHeader);

  if(state.showAddSub){
    const row=h('div',{style:{display:'flex',gap:'8px',marginBottom:'10px'}});
    const sinp=h('input',{type:'text',placeholder:'Subtopic title...',value:state.newSubTitle||'',
      style:{flex:'1',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--accent)',fontSize:'13px',outline:'none',fontFamily:'inherit'},
      oninput:e=>state.newSubTitle=e.target.value,
      onkeydown:e=>{if(e.key==='Enter'&&state.newSubTitle?.trim()){addSub();render()}}});
    row.appendChild(sinp);
    row.appendChild(h('button',{className:'btn btn-primary',style:{fontSize:'13px'},onclick:()=>{addSub();render()}},'Add'));
    row.appendChild(h('button',{className:'btn btn-outline',style:{padding:'8px'},innerHTML:ICO.x,onclick:()=>{state.showAddSub=false;state.newSubTitle='';render()}}));
    el.appendChild(row);
    setTimeout(()=>sinp.focus(),50);
  }

  subs.forEach(sub=>{
    const div=h('div',{className:'subtopic'});
    const hdr=h('div',{className:'subtopic-header'});
    const circ=h('button',{className:'st-circle'+(sub.status===3?' done':''),
      style:{borderColor:SCV[sub.status]},
      onclick:()=>{sub.status=(sub.status+1)%4;state.subtopics[n.id]=subs;save();render()}});
    if(sub.status===3)circ.innerHTML=ICO.check;
    hdr.appendChild(circ);
    hdr.appendChild(h('span',{style:{flex:'1',fontSize:'13px',fontWeight:'500',cursor:'pointer'},
      onclick:()=>{state.expandedSub=state.expandedSub===sub.id?null:sub.id;render()}},sub.title));
    const del=h('button',{style:{background:'none',border:'none',cursor:'pointer',opacity:'.4'},innerHTML:ICO.trash,
      onclick:()=>{if(confirm('Delete?')){state.subtopics[n.id]=subs.filter(s=>s.id!==sub.id);save();render()}}});
    hdr.appendChild(del);
    div.appendChild(hdr);

    if(state.expandedSub===sub.id){
      const subWrap=h('div',{style:{margin:'0 12px 12px',borderRadius:'8px',border:'1px solid var(--border)',overflow:'hidden',background:'var(--border-l)'}});
      const subTb=h('div',{style:{display:'flex',gap:'2px',padding:'4px 6px',background:'#fff',borderBottom:'1px solid var(--border)'}});
      let subRange=null;
      function subSave(){const sel=window.getSelection();if(sel&&sel.rangeCount>0&&sEditor.contains(sel.anchorNode))subRange=sel.getRangeAt(0).cloneRange();}
      function subApply(cmd,val){
        sEditor.focus();
        const sel=window.getSelection();
        if(sel&&subRange){sel.removeAllRanges();sel.addRange(subRange);}
        document.execCommand(cmd,false,val||null);
        sub.notes=sEditor.innerHTML;save();
      }
      function stBtn(cmd,icon,val){
        const b=h('button',{type:'button',className:'rte-btn',innerHTML:icon,style:{width:'26px',height:'24px',fontSize:'12px'}});
        b.addEventListener('touchstart',e=>{e.preventDefault();subSave();subApply(cmd,val);},{passive:false});
        b.addEventListener('mousedown',e=>{e.preventDefault();subApply(cmd,val);});
        return b;
      }
      [stBtn('bold','<b>B</b>'),stBtn('italic','<i>I</i>'),stBtn('insertUnorderedList',`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>`),stBtn('hiliteColor','<span style="background:#fef08a;padding:0 2px;font-size:11px">H</span>','#fef08a')].forEach(b=>subTb.appendChild(b));
      const sEditor=h('div',{contentEditable:'true',
        style:{width:'100%',minHeight:'80px',padding:'10px',fontSize:'13px',lineHeight:'1.5',outline:'none',background:'var(--border-l)',fontFamily:'inherit'},
        'data-placeholder':'Notes...'});
      sEditor.innerHTML=sub.notes||'';
      sEditor.addEventListener('input',()=>{sub.notes=sEditor.innerHTML;save();});
      sEditor.addEventListener('mouseup',subSave);
      sEditor.addEventListener('keyup',subSave);
      sEditor.addEventListener('touchend',subSave);
      subWrap.appendChild(subTb);subWrap.appendChild(sEditor);
      div.appendChild(subWrap);
    }
    el.appendChild(div);
  });

  if(!subs.length&&!state.showAddSub){
    el.appendChild(h('div',{className:'note-empty',style:{fontSize:'12px'}},'No subtopics yet'));
  }
}

function addSub(){
  const n=state.node;
  if(!state.newSubTitle?.trim())return;
  if(!state.subtopics[n.id])state.subtopics[n.id]=[];
  state.subtopics[n.id].push({id:n.id+'_st'+Date.now(),title:state.newSubTitle.trim(),status:0,notes:''});
  state.newSubTitle='';state.showAddSub=false;save();
}

function renderSync(el){
  const cfg=ghConfig();
  const lastSync=LS('last_sync');

  el.appendChild(h('div',{style:{padding:'12px 0 4px'}},
    h('h1',{style:{fontSize:'22px',fontWeight:'800',color:'var(--primary)'}},'Sync'),
    h('p',{style:{color:'var(--muted)',fontSize:'13px',marginTop:'4px'}},'Sync your data between phone & laptop via your private GitHub repo')
  ));

  if(cfg&&cfg.token){
    // Connected state
    const statusCard=h('div',{style:{background:'var(--s3bg)',border:'1px solid #bbf7d0',borderRadius:'var(--radius)',padding:'16px',margin:'16px 0'}});
    statusCard.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${ICO.ok}<span style="font-weight:700;color:#16a34a">Connected</span></div>
      <div style="font-size:13px;color:var(--muted)"><b>Repo:</b> ${cfg.owner}/${cfg.repo}</div>
      <div style="font-size:13px;color:var(--muted)"><b>File:</b> ${cfg.path||'kmap-data.json'}</div>
      ${lastSync?`<div style="font-size:12px;color:var(--muted);margin-top:4px">Last synced: ${new Date(lastSync).toLocaleString()}</div>`:''}`;
    el.appendChild(statusCard);

    // Sync status message
    if(state.syncStatus){
      const isErr=state.syncStatus.startsWith('Error');
      el.appendChild(h('div',{style:{padding:'10px 14px',borderRadius:'10px',fontSize:'13px',marginBottom:'12px',
        background:isErr?'#fef2f2':'#f0fdf4',color:isErr?'#dc2626':'#16a34a',fontWeight:'500'}},state.syncStatus));
    }

    // Sync buttons
    const btnRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'16px'}});

    const pullBtn=h('button',{className:'btn btn-primary',style:{flex:'1',justifyContent:'center',padding:'12px',fontSize:'14px',opacity:state.syncBusy?'.6':'1'},
      onclick:async()=>{
        if(state.syncBusy)return;state.syncBusy=true;state.syncStatus='Pulling...';render();
        const r=await ghPull();
        state.syncBusy=false;state.syncStatus=r.ok?'✓ '+r.msg:'Error: '+r.msg;render();
      }});
    pullBtn.innerHTML=ICO.sync+' Pull from GitHub';
    btnRow.appendChild(pullBtn);

    const pushBtn=h('button',{className:'btn',style:{flex:'1',justifyContent:'center',padding:'12px',fontSize:'14px',background:'#f0fdf4',color:'#16a34a',border:'1px solid #bbf7d0',opacity:state.syncBusy?'.6':'1'},
      onclick:async()=>{
        if(state.syncBusy)return;state.syncBusy=true;state.syncStatus='Pushing...';render();
        const r=await ghPush();
        state.syncBusy=false;state.syncStatus=r.ok?'✓ Pushed to GitHub':'Error: '+r.msg;render();
      }});
    pushBtn.innerHTML=ICO.cloud+' Push to GitHub';
    btnRow.appendChild(pushBtn);
    el.appendChild(btnRow);

    el.appendChild(h('p',{style:{fontSize:'12px',color:'var(--muted)',lineHeight:'1.5',marginBottom:'16px'}},
      'Auto-sync: changes push automatically 5 seconds after you save. Use Pull when opening on a new device to get latest data.'));

    // Disconnect
    const discBtn=h('button',{className:'card',style:{color:'#dc2626',fontSize:'13px',textAlign:'center',display:'block'},
      onclick:()=>{if(confirm('Remove sync config from this device? Your data stays in localStorage and on GitHub.')){ghClearConfig();state.syncStatus='';render()}}});
    discBtn.textContent='Disconnect from GitHub';
    el.appendChild(discBtn);

  } else {
    // Setup state
    el.appendChild(h('div',{style:{margin:'20px 0 16px'}},
      h('div',{innerHTML:ICO.shield,style:{display:'flex',justifyContent:'center',marginBottom:'12px',opacity:'.4'}}),
      h('p',{style:{fontSize:'13px',color:'var(--muted)',lineHeight:'1.6',textAlign:'center'}},
        'Your token is stored only in this browser\'s localStorage. It is never sent anywhere except directly to GitHub\'s API. Your data file lives in your private repo.')
    ));

    if(state.syncStatus){
      const isErr=state.syncStatus.startsWith('Error');
      el.appendChild(h('div',{style:{padding:'10px 14px',borderRadius:'10px',fontSize:'13px',marginBottom:'12px',
        background:isErr?'#fef2f2':'#f0fdf4',color:isErr?'#dc2626':'#16a34a'}},state.syncStatus));
    }

    const form=h('div',{style:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'16px',marginBottom:'16px'}});

    const fields=[
      {id:'gh_owner',label:'GitHub Username',placeholder:'your-username',val:LS('gh_setup_owner')||''},
      {id:'gh_repo',label:'Private Repo Name',placeholder:'obsidian-notes (your existing repo)',val:LS('gh_setup_repo')||''},
      {id:'gh_path',label:'File Path (in repo)',placeholder:'kmap-data.json',val:LS('gh_setup_path')||'kmap-data.json'},
      {id:'gh_token',label:'Personal Access Token',placeholder:'github_pat_...',val:LS('gh_setup_token')||'',type:'password'},
    ];
    fields.forEach(f=>{
      form.appendChild(h('label',{style:{fontSize:'12px',fontWeight:'700',color:'var(--muted)',display:'block',marginBottom:'4px',marginTop:'12px'}},f.label));
      const inp=h('input',{type:f.type||'text',placeholder:f.placeholder,value:f.val,
        style:{width:'100%',padding:'10px 12px',borderRadius:'8px',border:'1px solid var(--border)',fontSize:'14px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'},
        oninput:e=>LS('gh_setup_'+f.id.replace('gh_',''),e.target.value)});
      form.appendChild(inp);
    });
    el.appendChild(form);

    const connectBtn=h('button',{className:'btn btn-primary',style:{width:'100%',justifyContent:'center',padding:'14px',fontSize:'15px'},
      onclick:async()=>{
        const owner=LS('gh_setup_owner'),repo=LS('gh_setup_repo'),token=LS('gh_setup_token'),path=LS('gh_setup_path')||'kmap-data.json';
        if(!owner||!repo||!token){state.syncStatus='Error: Fill all fields';render();return;}
        state.syncBusy=true;state.syncStatus='Testing connection...';render();
        ghSaveConfig({owner,repo,token,path});
        const r=await ghPull();
        state.syncBusy=false;
        if(r.ok){
          state.syncStatus='✓ Connected! '+r.msg;
          // Clean setup fields
          localStorage.removeItem('km_gh_setup_owner');localStorage.removeItem('km_gh_setup_repo');
          localStorage.removeItem('km_gh_setup_token');localStorage.removeItem('km_gh_setup_path');
        }else{
          state.syncStatus='Error: '+r.msg;
          ghClearConfig();
        }
        render();
      }});
    connectBtn.textContent='Connect & Test';
    el.appendChild(connectBtn);

    // Instructions
    el.appendChild(h('div',{style:{marginTop:'20px',padding:'16px',background:'var(--border-l)',borderRadius:'var(--radius)',fontSize:'12px',color:'var(--muted)',lineHeight:'1.6'}},
      h('div',{style:{fontWeight:'700',marginBottom:'8px',fontSize:'13px',color:'var(--text)'}},'How to get a Personal Access Token:'),
      h('div',{innerHTML:`
        1. Go to <b>github.com → Settings → Developer settings</b><br>
        2. Click <b>Fine-grained tokens → Generate new token</b><br>
        3. Name: <b>KMap Sync</b><br>
        4. Expiration: <b>90 days</b> (you'll renew later)<br>
        5. Repository access: <b>Only select repositories</b> → pick your private repo<br>
        6. Permissions → Repository permissions → <b>Contents: Read and Write</b><br>
        7. Click <b>Generate token</b> → copy it → paste above
      `})
    ));
  }
}

function goBack(){
  if(state.view==='topic'){state.view='subdomain';state.editing=false}
  else if(state.view==='subdomain')state.view='domain';
  else if(state.view==='domain'){state.view='dashboard';state.tab='dashboard'}
  render();
}

// Handle back button
window.addEventListener('popstate',()=>{
  if(state.view!=='dashboard'){goBack();history.pushState(null,'');}
});
history.pushState(null,'');

// Initial render
render();

// Auto-pull from GitHub on load if configured
if(ghConfig()){
  ghPull().then(r=>{if(r.ok&&r.msg!=='No remote data yet — will create on first sync')render()});
}

// Register service worker for PWA install + offline
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
